<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="container">
    <button class="ng-btn" onclick="newGame()">New Game</button>
    <div class="scr-container">
        <div class="scr-wrapper">
        <h3 class="scr-head" id="head-h">HOME</h3>
        <p class="score" id="scr-home">0</p>
        <div class="increment-btns">
            <button class="increase" onclick="updateHome(1)">+1</button>
            <button class="increase" onclick="updateHome(2)">+2</button>
            <button class="increase" onclick="updateHome(3)">+3</button>
        </div>
     </div>

        <div class="scr-wrapper">
            <h3 class="scr-head" id="head-g">GUEST</h3>
            <p class="score" id="scr-guest">0</p>
            <div class="increment-btns">
                <button class="increase" onclick="updateGuest(1)">+1</button>
                <button class="increase" onclick="updateGuest(2)">+2</button>
                <button class="increase" onclick="updateGuest(3)">+3</button>
            </div>
        </div>
    </div>
</div>
<script src="index.js"></script>
</body>
</html>
